pre-commit:
  output: true
  commands:
    run-parent-hooks:
      skip:
        - merge
        - rebase
      run: |
        if [ "$LEFTHOOK_CHILD" = "1" ] || [ "${CI:-}" = "true" ]; then
          [ "$LEFTHOOK_CHILD" = "1" ] && echo "⏭️  Already running from parent, skipping"
          exit 0
        fi
        PARENT_DIR="$(cd .. && pwd)"
        if [ -f "$PARENT_DIR/lefthook.yml" ]; then
          echo "🔄 Running parent repo hooks..."
          export LEFTHOOK_CHILD=1
          cd "$PARENT_DIR" && pnpm exec lefthook run pre-commit --force
        else
          echo "ℹ️  Parent repo not found; running framework-local checks only"
        fi
    json-validity:
      glob: "**/*.json"
      run: |
        has_schema_validator=0
        if command -v pipx >/dev/null 2>&1; then
          has_schema_validator=1
        fi
        for f in {files}; do
          [ -f "$f" ] || continue
          if ! jq empty "$f" >/dev/null 2>&1; then
            echo "❌ invalid JSON: $f"
            exit 1
          fi
          schema=""
          case "$f" in
            *.claude-plugin/plugin.json|*/.claude-plugin/plugin.json)
              schema="https://www.schemastore.org/claude-code-plugin-manifest.json" ;;
            *.claude-plugin/marketplace.json|*/.claude-plugin/marketplace.json)
              schema="https://www.schemastore.org/claude-code-marketplace.json" ;;
            *.claude/settings.json|*.claude/settings.local.json|*/.claude/settings.json|*/.claude/settings.local.json)
              schema="https://www.schemastore.org/claude-code-settings.json" ;;
          esac
          if [ -n "$schema" ] && [ "$has_schema_validator" = "1" ]; then
            if ! pipx run check-jsonschema --schemafile "$schema" "$f" >/dev/null 2>&1; then
              pipx run check-jsonschema --schemafile "$schema" "$f"
              echo "❌ schema validation failed: $f against $schema"
              exit 1
            fi
          fi
        done
    yaml-validity:
      glob: "**/*.{yml,yaml}"
      exclude:
        - "plugins/*/skills/*/assets/**"
      run: |
        if ! command -v python3 >/dev/null 2>&1; then
          echo "ℹ️  python3 not available; skipping yaml-validity"
          exit 0
        fi
        if ! python3 -c "import yaml" >/dev/null 2>&1; then
          echo "ℹ️  python3 yaml module not available; skipping yaml-validity"
          exit 0
        fi
        for f in {files}; do
          [ -f "$f" ] || continue
          python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null || { echo "❌ invalid YAML: $f"; exit 1; }
        done
    skill-frontmatter:
      glob: "plugins/*/skills/*/SKILL.md"
      run: |
        for f in {files}; do
          [ -f "$f" ] || continue
          if ! head -10 "$f" | grep -q "^name:"; then
            echo "❌ missing 'name:' frontmatter: $f"
            exit 1
          fi
          if ! head -10 "$f" | grep -q "^description:"; then
            echo "❌ missing 'description:' frontmatter: $f"
            exit 1
          fi
        done
    evals-validity:
      glob: "plugins/*/skills/*/evals/scenarios.json"
      run: |
        for f in {files}; do
          [ -f "$f" ] || continue
          if ! jq empty "$f" >/dev/null 2>&1; then
            echo "❌ invalid JSON: $f"
            exit 1
          fi
          type=$(jq -r 'type' "$f")
          if [ "$type" != "array" ]; then
            echo "❌ $f: root must be an array, got $type"
            exit 1
          fi
          invalid=$(jq '[.[] | select((.prompt == null) or ((has("expect_action") | not) and (has("expect_skip") | not) and (has("expect") | not)))] | length' "$f")
          if [ "$invalid" -gt 0 ]; then
            echo "❌ $f: $invalid scenario(s) missing required keys (prompt + at least one of expect_action/expect_skip/expect)"
            exit 1
          fi
        done
    summarize-plugin-catalogs:
      run: |
        [ -d plugins ] || exit 0
        if ! command -v node >/dev/null 2>&1; then
          echo "ℹ️  node not available; skipping summarize-plugin-catalogs"
          exit 0
        fi
        for plugin in plugins/*/; do
          name=$(basename "$plugin")
          node scripts/summarize-markdown.js "$plugin" "${plugin}CATALOG.md" \
            --depth=4 \
            --fields=description,argument-hint \
            --title="$name catalog" \
            --tagline="Auto-generated index of skills, agents, references and assets shipped by the \`$name\` plugin." \
            >/dev/null
          git add "${plugin}CATALOG.md" 2>/dev/null || true
        done

pre-push:
  commands:
    run-parent-hooks:
      run: |
        if [ "$LEFTHOOK_CHILD" = "1" ] || [ "${CI:-}" = "true" ]; then
          [ "$LEFTHOOK_CHILD" = "1" ] && echo "⏭️  Already running from parent, skipping"
          exit 0
        fi
        PARENT_DIR="$(cd .. && pwd)"
        if [ -f "$PARENT_DIR/lefthook.yml" ]; then
          echo "🔄 Running parent repo hooks..."
          export LEFTHOOK_CHILD=1
          cd "$PARENT_DIR" && pnpm exec lefthook run pre-push --force
        else
          echo "⚠️  Parent repo not found, skipping hooks"
        fi

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
