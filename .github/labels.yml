# Canonical issue and PR label list for ai-driven-dev/aidd-framework.
#
# This file is the source of truth. When the GitHub label set drifts from
# this file, sync manually with:
#
#   for label in $(yq '.[].name' .github/labels.yml); do ... ; done
#
# or use a sync action (e.g. EndBug/label-sync@v2 driven by a workflow_dispatch
# job). Plugins may create their own labels on install; those are documented in
# the plugin, not here.

# --- Triage --------------------------------------------------------------

- name: bug
  description: Something isn't working
  color: d73a4a

- name: enhancement
  description: New feature or request
  color: a2eeef

- name: documentation
  description: Improvements or additions to documentation
  color: 0075ca

- name: security
  description: Security-sensitive issue or fix
  color: B60205

- name: good first issue
  description: Good for newcomers
  color: 7057ff

- name: help wanted
  description: Extra attention is needed
  color: 008672

# --- Dependencies --------------------------------------------------------

- name: dependencies
  description: Dependency update (dependabot)
  color: 0366d6

- name: github-actions
  description: GitHub Actions workflow change
  color: "000000"

- name: npm
  description: npm dependency update
  color: cb3837

# --- Release tooling -----------------------------------------------------

- name: "autorelease: pending"
  description: Release Please release PR awaiting merge
  color: ededed

- name: "autorelease: tagged"
  description: Release Please release tagged
  color: ededed
