name: ✨ Feature Request
description: Propose new content or an improvement to the framework
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? You can also post and upvote it in
        [Discussions](https://github.com/ai-driven-dev/aidd-framework/discussions) -
        popular ideas get promoted to a roadmap vote (see [ROADMAP.md](https://github.com/ai-driven-dev/aidd-framework/blob/main/ROADMAP.md)).
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What problem does this solve? e.g. "There is no rule for..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the content you want. Which file? Which format?
    validations:
      required: true
  - type: checkboxes
    id: content-type
    attributes:
      label: Content type
      options:
        - label: Rule
        - label: Skill
        - label: Command
        - label: Agent
        - label: Plugin
        - label: Other
  - type: checkboxes
    id: tools
    attributes:
      label: Target tool(s)
      options:
        - label: Claude Code
        - label: Cursor
        - label: Windsurf
        - label: Gemini CLI
        - label: Other
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, examples, use cases.
  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/ai-driven-dev/aidd-framework/blob/main/CODE_OF_CONDUCT.md).
          required: true
