name: 🐛 Bug Report
description: Report a bug or unexpected behaviour in the framework
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Fill in the fields below so a maintainer can reproduce quickly.
        For **usage questions**, use [Discussions](https://github.com/ai-driven-dev/framework/discussions) instead.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly. What happens? What should happen instead?
    validations:
      required: true
  - type: input
    id: affected
    attributes:
      label: Affected file(s)
      placeholder: plugins/aidd-vcs/skills/01-commit/SKILL.md
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behaviour
    validations:
      required: true
  - type: dropdown
    id: tool
    attributes:
      label: AI tool
      options:
        - Claude Code
        - Cursor
        - Windsurf
        - Gemini CLI
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: aidd-cli version
      placeholder: run `aidd --version`
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, specific use case.
  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/ai-driven-dev/framework/blob/main/CODE_OF_CONDUCT.md).
          required: true
