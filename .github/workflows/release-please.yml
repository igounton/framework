name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-attach:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CLI
        run: |
          npm config set @ai-driven-dev:registry https://npm.pkg.github.com
          npm config set //npm.pkg.github.com/:_authToken ${{ secrets.PACKAGES_TOKEN }}
          npm install -g @ai-driven-dev/aidd-cli@latest --prefer-online

      - name: Build distributions
        run: bash scripts/build-dist.sh

      - name: Build source tarball
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          tar czf "/tmp/aidd-framework-${VERSION}.tar.gz" \
            agents/ \
            commands/ \
            config/ \
            rules/ \
            skills/ \
            aidd_docs/ \
            version.txt

      - name: Build per-tool tarballs
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          for tool in claude cursor copilot opencode; do
            tar czf "/tmp/aidd-${tool}-${VERSION}.tar.gz" \
              -C dist/${tool} \
              --exclude='.aidd' \
              .
          done

      - name: Attach tarballs to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          TAG="${{ needs.release-please.outputs.tag_name }}"
          gh release upload "${TAG}" \
            "/tmp/aidd-framework-${VERSION}.tar.gz" \
            "/tmp/aidd-claude-${VERSION}.tar.gz" \
            "/tmp/aidd-cursor-${VERSION}.tar.gz" \
            "/tmp/aidd-copilot-${VERSION}.tar.gz" \
            "/tmp/aidd-opencode-${VERSION}.tar.gz" \
            --clobber
